<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MindSpero</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .stat-card {
            background: var(--surface);
            padding: 2rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            text-align: center;
        }
        .stat-card h3 { color: var(--text-muted); font-size: 1rem; margin-bottom: 0.5rem; }
        .stat-card .value { font-size: 2.5rem; font-weight: 700; color: var(--primary); }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-size: 0.9rem; }
        tr:hover { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body>
    <nav>
        <a href="#" class="logo">MindSpero Admin.</a>
        <div class="nav-links">
            <button id="themeToggle" class="btn btn-outline" style="padding: 0.4rem 0.6rem; border-radius: 50%; font-size: 1.1rem; border: none;">☀️</button>
            <button onclick="logoutAdmin()" class="btn btn-outline">Logout</button>
        </div>
    </nav>

    <div class="container">
        <h2>Overview</h2>
        <div class="grid-3" style="margin-top: 1.5rem; margin-bottom: 3rem;">
            <div class="stat-card">
                <h3>Total Users</h3>
                <div class="value" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <h3>Documents Processed</h3>
                <div class="value" id="totalUploads">0</div>
            </div>
            <div class="stat-card">
                <h3>Revenue</h3>
                <div class="value" id="totalRevenue">$0</div>
            </div>
        </div>

        <h2>Recent Users</h2>
        <div class="panel" style="margin-top: 1.5rem; overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Joined At</th>
                    </tr>
                </thead>
                <tbody id="userTable">
                    <tr><td colspan="4" style="text-align: center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./js/theme.js"></script>
    <script>
        axios.defaults.baseURL = 'http://localhost:3000';
        
        function logoutAdmin() {
            localStorage.removeItem('adminToken');
            window.location.href = './login.html';
        }

        async function loadAdminDashboard() {
            const token = localStorage.getItem('adminToken');
            if (!token) {
                window.location.href = './login.html';
                return;
            }
            axios.defaults.headers.common['Authorization'] = `Bearer ${token}`;

            try {
                const res = await axios.get('/api/admin/stats');
                const data = res.data;
                
                document.getElementById('totalUsers').innerText = data.stats.users;
                document.getElementById('totalUploads').innerText = data.stats.uploads;
                document.getElementById('totalRevenue').innerText = `$${parseFloat(data.stats.revenue).toFixed(2)}`;

                const tbody = document.getElementById('userTable');
                tbody.innerHTML = '';
                
                if (data.recentUsers.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">No users found.</td></tr>';
                }

                data.recentUsers.forEach(u => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${u.id}</td>
                        <td>${u.email}</td>
                        <td><span style="padding: 0.2rem 0.5rem; border-radius: 4px; background: var(--border); font-size: 0.8rem;">${u.status}</span></td>
                        <td>${new Date(u.created_at).toLocaleDateString()}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                if(err.response?.status === 401 || err.response?.status === 403) {
                    logoutAdmin();
                } else {
                    alert('Error loading dashboard');
                }
            }
        }

        loadAdminDashboard();
    </script>
</body>
</html>
