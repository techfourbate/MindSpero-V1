<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MindSpero</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .stat-card {
            background: var(--surface);
            padding: 2rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            text-align: center;
        }
        .stat-card h3 { color: var(--text-muted); font-size: 1rem; margin-bottom: 0.5rem; }
        .stat-card .value { font-size: 2.5rem; font-weight: 700; color: var(--primary); }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-size: 0.9rem; }
        tr:hover { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body>
    <nav>
        <a href="#" class="logo">MindSpero Admin.</a>
        <div class="nav-links">
            <button id="themeToggle" class="btn btn-outline" style="padding: 0.4rem 0.6rem; border-radius: 50%; font-size: 1.1rem; border: none;">☀️</button>
            <button onclick="logoutAdmin()" class="btn btn-outline">Logout</button>
        </div>
    </nav>

    <div class="container">
        <h2>Overview</h2>
        <div class="grid-stats" style="margin-top: 1.5rem; margin-bottom: 3rem;">
            <div class="stat-card">
                <h3>Total Users</h3>
                <div class="value" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <h3>Monthly Active</h3>
                <div class="value" id="monthlySubs">0</div>
            </div>
            <div class="stat-card">
                <h3>Yearly Active</h3>
                <div class="value" id="yearlySubs">0</div>
            </div>
            <div class="stat-card">
                <h3>Trial Users</h3>
                <div class="value" id="trialSubs">0</div>
            </div>
            <div class="stat-card">
                <h3>Documents</h3>
                <div class="value" id="totalUploads">0</div>
            </div>
            <div class="stat-card">
                <h3>Revenue</h3>
                <div class="value" id="totalRevenue">$0</div>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 3rem;">
            <h2 style="margin-top: 0;">User Subscriptions</h2>
            <button class="btn btn-primary" onclick="document.getElementById('addUserModal').style.display='block'">+ Add User</button>
        </div>

        <!-- Add User Modal -->
        <div id="addUserModal" style="display: none; padding: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-top: 1rem;">
            <h3 style="margin-bottom: 1rem;">Add New User</h3>
            <form id="addUserForm" onsubmit="handleAddUser(event)">
                <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                    <div style="flex: 1;">
                        <label>Email</label>
                        <input type="email" id="newEmail" class="form-input" required>
                    </div>
                    <div style="flex: 1;">
                        <label>Password</label>
                        <input type="password" id="newPassword" class="form-input" required>
                    </div>
                    <div style="flex: 1;">
                        <label>Plan</label>
                        <select id="newPlan" class="form-input">
                            <option value="trial">Trial</option>
                            <option value="monthly">Monthly</option>
                            <option value="yearly">Yearly</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Create User</button>
                <button type="button" class="btn btn-outline" onclick="document.getElementById('addUserModal').style.display='none'">Cancel</button>
                <div id="addUserError" style="color: #ef4444; margin-top: 0.5rem;" class="hidden"></div>
            </form>
        </div>

        <div class="panel" style="margin-top: 1.5rem; overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Email</th>
                        <th>Plan</th>
                        <th>Status</th>
                        <th>Expiry Date</th>
                        <th>Joined At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="userTable">
                    <tr><td colspan="7" style="text-align: center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <h2 style="margin-top: 3rem;">Recent Transactions</h2>
        <div class="panel" style="margin-top: 1.5rem; overflow-x: auto; margin-bottom: 3rem;">
            <table>
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Reference</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="paymentTable">
                    <tr><td colspan="5" style="text-align: center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./js/theme.js"></script>
    <script>
        axios.defaults.baseURL = 'http://localhost:3000';
        
        function logoutAdmin() {
            localStorage.removeItem('adminToken');
            window.location.href = './login.html';
        }

        async function loadAdminDashboard() {
            const token = localStorage.getItem('adminToken');
            if (!token) {
                window.location.href = './login.html';
                return;
            }
            axios.defaults.headers.common['Authorization'] = `Bearer ${token}`;

            try {
                const res = await axios.get('/api/admin/stats');
                const data = res.data;
                
                document.getElementById('totalUsers').innerText = data.stats.users;
                document.getElementById('monthlySubs').innerText = data.stats.monthly;
                document.getElementById('yearlySubs').innerText = data.stats.yearly;
                document.getElementById('trialSubs').innerText = data.stats.trials;
                document.getElementById('totalUploads').innerText = data.stats.uploads;
                document.getElementById('totalRevenue').innerText = `$${parseFloat(data.stats.revenue).toFixed(2)}`;

                const tbody = document.getElementById('userTable');
                tbody.innerHTML = '';
                
                if (data.recentUsers.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No users found.</td></tr>';
                }

                data.recentUsers.forEach(u => {
                    const expiry = u.subscription_end ? new Date(u.subscription_end).toLocaleDateString() : 'N/A';
                    const planText = u.plan ? (u.plan.charAt(0).toUpperCase() + u.plan.slice(1)) : 'Trial';
                    const statusColor = u.status === 'active' ? '#10b981' : (u.status === 'expired' ? '#ef4444' : 'var(--text-muted)');
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${u.id}</td>
                        <td>${u.email}</td>
                        <td style="font-weight: 500;">${planText}</td>
                        <td><span style="padding: 0.2rem 0.5rem; border-radius: 4px; background: rgba(255,255,255,0.05); color: ${statusColor}; font-size: 0.8rem; font-weight: 500;">${u.status.toUpperCase()}</span></td>
                        <td>${expiry}</td>
                        <td>${new Date(u.created_at).toLocaleDateString()}</td>
                        <td>
                            <button onclick="deleteUser(${u.id})" style="background: transparent; border: 1px solid #ef4444; color: #ef4444; border-radius: 4px; padding: 0.2rem 0.5rem; cursor: pointer;">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                const ptbody = document.getElementById('paymentTable');
                ptbody.innerHTML = '';
                if (!data.recentPayments || data.recentPayments.length === 0) {
                    ptbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">No transactions found.</td></tr>';
                } else {
                    data.recentPayments.forEach(tx => {
                        const statusColor = tx.status === 'successful' ? '#10b981' : (tx.status === 'failed' ? '#ef4444' : '#f59e0b');
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${tx.email}</td>
                            <td style="font-family: monospace; font-size: 0.85rem;">${tx.tx_ref}</td>
                            <td style="font-weight: bold;">${tx.currency} ${tx.amount}</td>
                            <td><span style="padding: 0.2rem 0.5rem; border-radius: 4px; background: rgba(255,255,255,0.05); color: ${statusColor}; font-size: 0.8rem; font-weight: 500;">${tx.status.toUpperCase()}</span></td>
                            <td>${new Date(tx.created_at).toLocaleDateString()} ${new Date(tx.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</td>
                        `;
                        ptbody.appendChild(tr);
                    });
                }
            } catch (err) {
                if(err.response?.status === 401 || err.response?.status === 403) {
                    logoutAdmin();
                } else {
                    alert('Error loading dashboard');
                }
            }
        }

        async function deleteUser(id) {
            if(!confirm('Are you sure you want to completely delete this user and all their data?')) return;
            try {
                const res = await axios.delete('/api/admin/users/' + id);
                if(res.data.success) {
                    alert('User deleted successfully.');
                    loadAdminDashboard(); // refresh stats
                }
            } catch (err) {
                alert(err.response?.data?.message || 'Error deleting user');
            }
        }

        async function handleAddUser(e) {
            e.preventDefault();
            const email = document.getElementById('newEmail').value;
            const password = document.getElementById('newPassword').value;
            const plan = document.getElementById('newPlan').value;
            const errEl = document.getElementById('addUserError');
            
            errEl.classList.add('hidden');
            try {
                const res = await axios.post('/api/admin/users', { email, password, plan });
                if(res.data.success) {
                    document.getElementById('addUserForm').reset();
                    document.getElementById('addUserModal').style.display = 'none';
                    loadAdminDashboard(); // refresh stats
                }
            } catch (err) {
                errEl.classList.remove('hidden');
                errEl.textContent = err.response?.data?.message || 'Failed to create user';
            }
        }

        loadAdminDashboard();
    </script>
</body>
</html>
