<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - MindSpero</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <nav>
        <a href="./index.html" class="logo">MindSpero.</a>
        <div class="nav-links">
            <button id="themeToggle" class="btn btn-outline" style="padding: 0.4rem 0.6rem; border-radius: 50%; font-size: 1.1rem; border: none;">☀️</button>
            <a href="./login.html" class="btn btn-outline">Sign In</a>
        </div>
    </nav>

    <div class="container">
        <div class="auth-card">
            <h2>Reset Password</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Enter your email to receive a reset link</p>
            
            <form id="forgotForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" required>
                </div>
                <div id="statusMsg" style="font-size: 0.9rem; margin-top: 0.5rem;" class="hidden"></div>
                
                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Send Reset Link</button>
            </form>
            <p style="margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
                Remembered your password? <a href="./login.html">Sign In</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./js/theme.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const statusMsg = document.getElementById('statusMsg');
            
            try {
                const res = await axios.post('/api/auth/forgot-password', { email });
                statusMsg.classList.remove('hidden');
                statusMsg.style.color = '#10b981'; // Success green
                statusMsg.textContent = res.data.message || 'Reset link sent!';
            } catch (err) {
                statusMsg.classList.remove('hidden');
                statusMsg.style.color = '#ef4444'; // Error red
                statusMsg.textContent = err.response?.data?.message || 'Failed to send reset link';
            }
        });
    </script>
</body>
</html>
