<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - MindSpero</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <nav>
        <a href="./index.html" class="logo">MindSpero.</a>
        <div class="nav-links">
            <button id="themeToggle" class="btn btn-outline" style="padding: 0.4rem 0.6rem; border-radius: 50%; font-size: 1.1rem; border: none;">☀️</button>
            <a href="./login.html" class="btn btn-outline">Sign In</a>
        </div>
    </nav>

    <div class="container">
        <div class="auth-card">
            <h2>Set New Password</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Enter your new password below</p>
            
            <form id="resetForm" class="auth-form">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" class="form-input" required>
                </div>
                <div id="statusMsg" style="font-size: 0.9rem; margin-top: 0.5rem;" class="hidden"></div>
                
                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Update Password</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./js/theme.js"></script>
    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const statusMsg = document.getElementById('statusMsg');
            
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                statusMsg.classList.remove('hidden');
                statusMsg.style.color = '#ef4444';
                statusMsg.textContent = 'Missing reset token.';
                return;
            }
            
            try {
                const res = await axios.post('/api/auth/reset-password', { token, password });
                statusMsg.classList.remove('hidden');
                statusMsg.style.color = '#10b981';
                statusMsg.textContent = res.data.message || 'Password updated successfuly!';
                setTimeout(() => {
                    window.location.href = './login.html';
                }, 2000);
            } catch (err) {
                statusMsg.classList.remove('hidden');
                statusMsg.style.color = '#ef4444';
                statusMsg.textContent = err.response?.data?.message || 'Failed to update password';
            }
        });
    </script>
</body>
</html>
