<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MindSpero</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <nav>
        <a href="./index.html" class="logo">MindSpero.</a>
        <div class="nav-links">
            <button id="themeToggle" class="btn btn-outline" style="padding: 0.4rem 0.6rem; border-radius: 50%; font-size: 1.1rem; border: none;">☀️</button>
            <a href="./register.html" class="btn btn-outline">Register</a>
        </div>
    </nav>

    <div class="container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Access your study dashboard</p>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" required>
                </div>
                <div id="errorMsg" style="color: #ef4444; font-size: 0.9rem; margin-top: 0.5rem;" class="hidden"></div>
                <div style="text-align: right; margin-top: 0.5rem;">
                    <a href="./forgot-password.html" style="font-size: 0.85rem; color: var(--primary);">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Sign In</button>
            </form>
            <p style="margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
                Don't have an account? <a href="./register.html">Start Trial</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./js/theme.js"></script>
    <script src="./js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('verified') === 'true') {
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.classList.remove('hidden');
                errorMsg.style.color = '#10b981'; // Success green
                errorMsg.textContent = 'Email verified successfully! You can now log in.';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            try {
                const res = await axios.post('/api/auth/login', { email, password });
                if (res.data.success) {
                    if (res.data.role === 'admin') {
                        localStorage.setItem('adminToken', res.data.token);
                        window.location.href = './admin-dashboard.html';
                    } else {
                        localStorage.setItem('token', res.data.token);
                        window.location.href = './dashboard.html';
                    }
                }
            } catch (err) {
                errorMsg.classList.remove('hidden');
                errorMsg.textContent = err.response?.data?.message || 'Login failed';
            }
        });
    </script>
</body>
</html>
