<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MindSpero</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <nav>
        <a href="./index.html" class="logo">MindSpero.</a>
        <div class="nav-links">
            <button id="themeToggle" class="btn btn-outline" style="padding: 0.4rem 0.6rem; border-radius: 50%; font-size: 1.1rem; border: none;">☀️</button>
            <a href="./register.html" class="btn btn-outline">Register</a>
        </div>
    </nav>

    <div class="container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Access your study dashboard</p>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" required>
                </div>
                <div id="errorMsg" style="color: #ef4444; font-size: 0.9rem; margin-top: 0.5rem;" class="hidden"></div>
                <div style="text-align: right; margin-top: 0.5rem;">
                    <a href="./forgot-password.html" style="font-size: 0.85rem; color: var(--primary);">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Sign In</button>
                
                <div style="display: flex; align-items: center; margin: 1.5rem 0; text-align: center;">
                    <hr style="flex: 1; border: none; border-top: 1px solid var(--border-color, #e5e7eb);">
                    <span style="padding: 0 10px; color: var(--text-muted); font-size: 0.9rem;">or</span>
                    <hr style="flex: 1; border: none; border-top: 1px solid var(--border-color, #e5e7eb);">
                </div>
                
                <div id="googleBtnContainer" style="display: flex; justify-content: center;"></div>
            </form>
            <p style="margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
                Don't have an account? <a href="./register.html">Start Trial</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./js/theme.js"></script>
    <script src="./js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('verified') === 'true') {
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.classList.remove('hidden');
                errorMsg.style.color = '#10b981'; // Success green
                errorMsg.textContent = 'Email verified successfully! You can now log in.';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            try {
                const res = await axios.post('/api/auth/login', { email, password });
                if (res.data.success) {
                    if (res.data.role === 'admin') {
                        localStorage.setItem('adminToken', res.data.token);
                        window.location.href = './admin-dashboard.html';
                    } else {
                        localStorage.setItem('token', res.data.token);
                        window.location.href = './dashboard.html';
                    }
                }
            } catch (err) {
                errorMsg.classList.remove('hidden');
                errorMsg.textContent = err.response?.data?.message || 'Login failed';
            }
        });

        // Setup Google Sign In
        axios.get('/api/auth/google-config').then(res => {
            const clientId = res.data.clientId;
            if(clientId) {
                const script = document.createElement('script');
                script.src = "https://accounts.google.com/gsi/client";
                script.async = true;
                script.defer = true;
                document.head.appendChild(script);

                window.handleGoogleRes = async (response) => {
                    try {
                        const verifyRes = await axios.post('/api/auth/google', { token: response.credential });
                        if (verifyRes.data.success) {
                            localStorage.setItem('token', verifyRes.data.token);
                            window.location.href = './dashboard.html';
                        }
                    } catch (err) {
                        const errorMsg = document.getElementById('errorMsg');
                        errorMsg.classList.remove('hidden');
                        errorMsg.style.color = '#ef4444';
                        errorMsg.textContent = err.response?.data?.message || 'Google login failed';
                    }
                };

                script.onload = () => {
                    google.accounts.id.initialize({
                        client_id: clientId,
                        callback: handleGoogleRes
                    });
                    google.accounts.id.renderButton(
                        document.getElementById("googleBtnContainer"),
                        { theme: document.body.getAttribute('data-theme') === 'dark' ? "filled_black" : "outline", size: "large", text: "signin_with" }
                    );
                };
            }
        }).catch(err => console.error("Could not load google config", err));
    </script>
</body>
</html>
