<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MindSpero</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <nav>
        <a href="./index.html" class="logo">MindSpero.</a>
        <div class="nav-links">
            <button id="themeToggle" class="btn btn-outline" style="padding: 0.4rem 0.6rem; border-radius: 50%; font-size: 1.1rem; border: none;">☀️</button>
            <a href="./login.html" class="btn btn-outline">Sign In</a>
        </div>
    </nav>

    <div class="container">
        <div class="auth-card">
            <h2>Start Your 30-Day Free Trial</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Create a free account to unlock your AI Study Tutor.</p>
            
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" required>
                </div>
                <!-- Optional Checkbox for terms -->
                
                <div id="errorMsg" style="color: #ef4444; font-size: 0.9rem; margin-top: 0.5rem;" class="hidden"></div>
                <div id="successMsg" style="color: #10b981; font-size: 0.9rem; margin-top: 0.5rem;" class="hidden">Account created! Please check your email to verify your account before logging in.</div>

                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Create Account</button>

                <div style="display: flex; align-items: center; margin: 1.5rem 0; text-align: center;">
                    <hr style="flex: 1; border: none; border-top: 1px solid var(--border-color, #e5e7eb);">
                    <span style="padding: 0 10px; color: var(--text-muted); font-size: 0.9rem;">or</span>
                    <hr style="flex: 1; border: none; border-top: 1px solid var(--border-color, #e5e7eb);">
                </div>
                
                <div id="googleBtnContainer" style="display: flex; justify-content: center;"></div>
            </form>
            <p style="margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
                Already have an account? <a href="./login.html">Sign In</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./js/theme.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            try {
                const res = await axios.post('/api/auth/register', { email, password });
                if (res.data.success) {
                    errorMsg.classList.add('hidden');
                    successMsg.classList.remove('hidden');
                }
            } catch (err) {
                successMsg.classList.add('hidden');
                errorMsg.classList.remove('hidden');
                errorMsg.textContent = err.response?.data?.message || 'Registration failed';
            }
        });

        // Setup Google Sign In
        axios.get('/api/auth/google-config').then(res => {
            const clientId = res.data.clientId;
            if(clientId) {
                const script = document.createElement('script');
                script.src = "https://accounts.google.com/gsi/client";
                script.async = true;
                script.defer = true;
                document.head.appendChild(script);

                window.handleGoogleRes = async (response) => {
                    try {
                        const verifyRes = await axios.post('/api/auth/google', { token: response.credential });
                        if (verifyRes.data.success) {
                            localStorage.setItem('token', verifyRes.data.token);
                            window.location.href = './dashboard.html';
                        }
                    } catch (err) {
                        const errorMsg = document.getElementById('errorMsg');
                        errorMsg.classList.remove('hidden');
                        successMsg.classList.add('hidden');
                        errorMsg.textContent = err.response?.data?.message || 'Google signup failed';
                    }
                };

                script.onload = () => {
                    google.accounts.id.initialize({
                        client_id: clientId,
                        callback: handleGoogleRes
                    });
                    google.accounts.id.renderButton(
                        document.getElementById("googleBtnContainer"),
                        { theme: document.body.getAttribute('data-theme') === 'dark' ? "filled_black" : "outline", size: "large", text: "signup_with" }
                    );
                };
            }
        }).catch(err => console.error("Could not load google config", err));
    </script>
</body>
</html>
